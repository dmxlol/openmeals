# Image registry and repository prefix (api and worker suffixes are appended automatically)
image:
  registry: ghcr.io
  # Set to your GitHub username/org, e.g. "myuser/openmeals"
  repository: YOUR_USER/openmeals
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

# --- API ---
api:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

# --- Worker ---
worker:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi

# --- Service ---
service:
  type: ClusterIP
  port: 80
  targetPort: 8000

# --- Ingress ---
ingress:
  enabled: false
  className: ""
  annotations: {}
    # nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - host: openmeals.example.com
      paths:
        - path: /api
          pathType: Prefix
  tls: []
  #  - secretName: openmeals-tls
  #    hosts:
  #      - openmeals.example.com

# --- Non-secret configuration ---
config:
  defaultLocale: en-US
  # Comma-separated CORS origins; empty = allow all (dev only)
  allowedOrigins: ""
  embeddingProvider: sentence-transformers
  # OTEL
  otelEnabled: "false"
  otelEndpoint: ""     # e.g. http://otel-collector:4318
  # S3
  s3Bucket: ""
  s3CdnBaseUrl: ""
  awsDefaultRegion: eu-central-1
  awsEndpointUrl: ""   # leave empty for real AWS; set for LocalStack etc.

# Name of an existing Secret with the sensitive values below.
# Create it before installing the chart:
#   kubectl create secret generic openmeals-secrets \
#     --from-literal=DATABASE_URL=postgresql+asyncpg://... \
#     --from-literal=SECRET_KEY=$(python -c "import secrets; print(secrets.token_urlsafe(32))") \
#     --from-literal=CELERY_BROKER_URL=amqp://... \
#     --from-literal=CELERY_RESULT_BACKEND=redis://... \
#     --from-literal=AWS_ACCESS_KEY_ID=... \
#     --from-literal=AWS_SECRET_ACCESS_KEY=...
#
# For branded clients, add keys like:
#     --from-literal=CLIENTS__OPENPEEL=<PEM public key>
existingSecret: openmeals-secrets

# --- Horizontal Pod Autoscaler (API only) ---
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
