services:
  db:
    build: { dockerfile: Dockerfile.db }
    environment:
      POSTGRES_USER: nutrition
      POSTGRES_PASSWORD: nutrition
      POSTGRES_DB: nutrition
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"

  localstack:
    image: localstack/localstack:4
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEFAULT_REGION: eu-central-1
    volumes:
      - ./scripts/localstack_init.sh:/etc/localstack/init/ready.d/init.sh:ro
      - localstack_data:/var/lib/localstack

volumes:
  postgres_data:
  localstack_data:
