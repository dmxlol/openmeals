services:
  api:
    build:
      context: .
      target: api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build:
      context: .
      target: worker
    env_file: .env
    depends_on:
      - db
      - redis

  db:
    build: { dockerfile: Dockerfile.db }
    environment:
      POSTGRES_USER: nutrition
      POSTGRES_PASSWORD: nutrition
      POSTGRES_DB: nutrition
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rmq:
    image: rabbitmq:4-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"

  localstack:
    image: localstack/localstack:4
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEFAULT_REGION: eu-central-1
    volumes:
      - ./scripts/localstack_init.sh:/etc/localstack/init/ready.d/init.sh:ro
      - localstack_data:/var/lib/localstack

volumes:
  postgres_data:
  localstack_data:
