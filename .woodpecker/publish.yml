when:
  - event: tag

steps:
  - name: build-api
    image: moby/buildkit:v0.21.0
    environment:
      BUILDKIT_HOST:
        from_secret: buildkit_host
      REGISTRY_HOST:
        from_secret: registry_host
      REGISTRY_USER:
        from_secret: registry_username
      REGISTRY_PASS:
        from_secret: registry_password
    commands:
      - mkdir -p /root/.docker
      - printf '{"auths":{"%s":{"auth":"%s"}}}' "$REGISTRY_HOST" "$(printf '%s:%s' "$REGISTRY_USER" "$REGISTRY_PASS" | base64 | tr -d '\n')" > /root/.docker/config.json
      - VERSION="${CI_COMMIT_TAG}-${CI_COMMIT_SHA:0:8}"
      - IMG="$REGISTRY_HOST/openmeals/api"
      - buildctl build
          --frontend dockerfile.v0
          --opt target=api
          --local context=.
          --local dockerfile=.
          --output "type=image,\"name=$IMG:latest,$IMG:$VERSION\",push=true"

  - name: build-worker
    image: moby/buildkit:v0.21.0
    environment:
      BUILDKIT_HOST:
        from_secret: buildkit_host
      REGISTRY_HOST:
        from_secret: registry_host
      REGISTRY_USER:
        from_secret: registry_username
      REGISTRY_PASS:
        from_secret: registry_password
    commands:
      - mkdir -p /root/.docker
      - printf '{"auths":{"%s":{"auth":"%s"}}}' "$REGISTRY_HOST" "$(printf '%s:%s' "$REGISTRY_USER" "$REGISTRY_PASS" | base64 | tr -d '\n')" > /root/.docker/config.json
      - VERSION="${CI_COMMIT_TAG}-${CI_COMMIT_SHA:0:8}"
      - IMG="$REGISTRY_HOST/openmeals/worker"
      - buildctl build
          --frontend dockerfile.v0
          --opt target=worker
          --local context=.
          --local dockerfile=.
          --output "type=image,\"name=$IMG:latest,$IMG:$VERSION\",push=true"

  - name: publish-chart
    image: alpine/helm:3
    environment:
      REGISTRY_HOST:
        from_secret: registry_host
      REGISTRY_USER:
        from_secret: registry_username
      REGISTRY_PASS:
        from_secret: registry_password
    commands:
      - helm registry login "$REGISTRY_HOST" -u "$REGISTRY_USER" -p "$REGISTRY_PASS"
      - VERSION="${CI_COMMIT_TAG}-${CI_COMMIT_SHA:0:8}"
      - helm package helm/ --version "$VERSION" --app-version "$VERSION"
      - helm push "openmeals-$VERSION.tgz" "oci://$REGISTRY_HOST/openmeals"